name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: joby
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create application.properties
        run: |
          cat > src/main/resources/application.properties << EOF
          spring.application.name=joby
          spring.datasource.url=jdbc:postgresql://localhost:5432/joby
          spring.datasource.username=admin
          spring.datasource.password=secret
          spring.jpa.hibernate.ddl-auto=validate
          spring.flyway.enabled=true
          spring.jpa.open-in-view=false
          management.endpoints.web.exposure.include=health,info,metrics,prometheus
          management.endpoint.health.show-details=always
          spring.kafka.bootstrap-servers=localhost:9092
          spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
          spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
          spring.kafka.consumer.group-id=joby-workers
          spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
          spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
          spring.kafka.consumer.auto-offset-reset=earliest
          joby.api-key=test-api-key
          joby.worker.threads=5
          logging.level.org.apache.kafka=WARN
          logging.level.org.springframework.kafka=WARN
          EOF

      - name: Build with Gradle
        run: ./gradlew build -x test

      - name: Run tests
        run: ./gradlew test

      - name: Publish test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: build/reports/tests/test/
      - name: Debug token
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "TOKEN IS EMPTY"
          else
            echo "TOKEN EXISTS with length ${#RAILWAY_TOKEN}"
          fi
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to Railway
        uses: bervProject/railway-deploy@main
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        with:
          service: ${{ secrets.RAILWAY_SERVICE_ID }}
          detach: true